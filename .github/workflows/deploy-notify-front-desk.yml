name: deploy-notify-front-desk
# One-shot: wire notify-front-desk.yml into every public org repo.
# Direct-push repos get a commit straight to main.
# Repos with branch protection get a PR from feat/notify-front-desk.
on:
  workflow_dispatch: {}
permissions: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ secrets.FRONT_DESK_APP_CLIENT_ID }}
          private-key: ${{ secrets.FRONT_DESK_APP_PRIVATE_KEY }}
          owner: bounded-systems
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with: { deno-version: v2.x }
      - name: Deploy
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: deno run --allow-net=api.github.com --allow-env scripts/deploy-notify-front-desk.ts
