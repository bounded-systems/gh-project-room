name: front-desk-health
# Runs the charter health scorecard (health.ts, #62) on PRs touching
# charter-enforcement code, so a regression in an invariant is visible in the
# PR's checks. Report-only for now (#63's AC) — deciding which rows hard-fail
# CI is a separate, later per-invariant decision, not a blanket gate today.
on:
  pull_request:
    paths:
      - "contract.ts"
      - "prioritization.ts"
      - "projects.ts"
      - "sync.ts"
      - "webhook.ts"
      - "health.ts"
      - "docs/front-desk-charter.md"
permissions:
  contents: read
  id-token: write # OIDC → cf-token-broker (same pattern as front-desk-sync.yml)
jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with: { deno-version: v2.x }
      # health.ts reads org-wide (all repos' issues/PRs + the Project v2
      # board), which the repo-default GITHUB_TOKEN can't see — mint the
      # Front Desk App token over OIDC, same as front-desk-sync.yml. Best
      # effort: a broker hiccup must not turn "report-only" into "blocks
      # every charter PR" — continue-on-error on both steps.
      - name: Mint Front Desk token via the OIDC broker
        id: broker-token
        if: ${{ vars.FRONT_DESK_BROKER_URL != '' }}
        continue-on-error: true
        env:
          BROKER_URL: ${{ vars.FRONT_DESK_BROKER_URL }}
        run: |
          set -euo pipefail
          jwt="$(curl -fsS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=github-app-broker" | jq -r '.value // empty')"
          [ -n "$jwt" ] || { echo "::error::failed to obtain an OIDC token"; exit 1; }
          tok="$(curl -fsS -X POST -H "Authorization: Bearer ${jwt}" \
            "${BROKER_URL%/}/github/front-desk" | jq -r '.token // empty')"
          [ -n "$tok" ] || { echo "::error::broker did not return a token for app 'front-desk'"; exit 1; }
          echo "::add-mask::$tok"
          echo "token=$tok" >> "$GITHUB_OUTPUT"
      - name: Run health scorecard (report-only)
        if: ${{ steps.broker-token.outputs.token != '' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ steps.broker-token.outputs.token }}
        run: deno task health
