name: front-desk-sync
# Runs the gh-project-room sweep (sync.ts):
#   1. reconcile board fields to contract
#   2. add all open org issues/PRs not yet on Front Desk
#   3. write back computed Score for every on-board item
#
# Triggers:
#   - issues/PRs opened, closed, labeled in THIS repo (immediate)
#   - workflow_call from other org repos via trigger-sync.yml (cross-repo)
#   - daily schedule at 06:00 UTC (catch-all: field edits, cross-repo drift)
#   - workflow_dispatch (manual / CI)
#
# Token (prx-26bq): the Front Desk App token is minted by the cf-token-broker via GitHub
# Actions OIDC — the App private key lives ONLY in the broker, not in this org's secrets.
# Set the repo/org variable FRONT_DESK_BROKER_URL to the broker base URL to switch it on.
# Until that var is set the credentialed steps are skipped (fail-open) and the sweep no-ops;
# the per-repo front-desk-add backstop still adds cards. The OIDC→broker exchange is
# inlined (the infra broker-gh-token action is in a private repo; a public repo can't
# resolve it). The broker registers `front-desk` with least-privilege permissions:
#   - organization projects: read + write  (Projects v2 mutations)
#   - issues: read (all org repos)
#   - metadata: read (repo enumeration)
# Legacy org secrets FRONT_DESK_APP_CLIENT_ID / FRONT_DESK_APP_PRIVATE_KEY are no longer read.
on:
  issues:
    types: [opened, closed, reopened, labeled, unlabeled, transferred]
  pull_request:
    types: [opened, closed, reopened, labeled, unlabeled]
  workflow_call: {}
  schedule:
    - cron: "0 6 * * *" # daily catch-all
  workflow_dispatch: {}
# Debounce: cancel any in-progress sweep when a new event arrives.
concurrency:
  group: front-desk-sync
  cancel-in-progress: true
permissions:
  id-token: write # OIDC → cf-token-broker (the only capability the job needs)
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Pin the checkout to THIS repo + ref. When invoked cross-repo via
      # workflow_call (trigger-sync.yml from another org repo), the github
      # context belongs to the CALLER, so a bare checkout would clone the
      # caller's repo — leaving sync.ts absent and failing the run. Pinning
      # repo+ref makes every trigger path run this repo's canonical sweep.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: bounded-systems/gh-project-room
          ref: main
      # Fail-open until the broker is configured: an unset FRONT_DESK_BROKER_URL means
      # the App key isn't brokered yet, so skip the credentialed steps and let the job
      # pass (the per-repo front-desk-add backstop still adds cards). Mirrors the proven
      # front-desk-add posture; remove this once FRONT_DESK_BROKER_URL is set org-wide.
      - name: broker not configured — skipping sweep
        if: ${{ vars.FRONT_DESK_BROKER_URL == '' }}
        run: echo "FRONT_DESK_BROKER_URL unset; broker not deployed yet — relying on front-desk-add. See prx-26bq."
      # Best-effort: the sweep is a RECONCILE (idempotent) with a daily-schedule
      # backstop, and it's fanned out from every repo's issue/PR events. So a
      # transient failure — above all the Front Desk App INSTALLATION hitting its
      # shared API rate limit during a burst of events — must NOT red-flag every
      # caller's PR. The next event/schedule sweep catches up. (continue-on-error
      # on the mint + sweep steps, so the job still succeeds.)
      # Inlined (not the infra broker-gh-token composite action): that action lives in the
      # PRIVATE infra repo, and a public repo's workflow can't resolve a composite action
      # from a private repo — GitHub downloads every referenced action at job setup, before
      # `if:` is evaluated, so even a skipped `uses:` step fails the run. Same two curls the
      # action runs; mirrors cloudflare.yml's inline OIDC→broker pattern.
      - name: Mint Front Desk token via the OIDC broker
        id: app-token
        if: ${{ vars.FRONT_DESK_BROKER_URL != '' }}
        continue-on-error: true
        env:
          BROKER_URL: ${{ vars.FRONT_DESK_BROKER_URL }}
        run: |
          set -euo pipefail
          jwt="$(curl -fsS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=github-app-broker" | jq -r '.value // empty')"
          [ -n "$jwt" ] || { echo "::error::failed to obtain an OIDC token"; exit 1; }
          tok="$(curl -fsS -X POST -H "Authorization: Bearer ${jwt}" \
            "${BROKER_URL%/}/github/front-desk" | jq -r '.token // empty')"
          [ -n "$tok" ] || { echo "::error::broker did not return a token for app 'front-desk'"; exit 1; }
          echo "::add-mask::$tok"
          echo "token=$tok" >> "$GITHUB_OUTPUT"
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with: { deno-version: v2.x }
      - name: Run sweep
        if: ${{ steps.app-token.outputs.token != '' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: deno run --allow-net=api.github.com --allow-env sync.ts
