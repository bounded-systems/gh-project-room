name: trigger-front-desk-sync
# Reusable entry-point: call this from any org repo to kick off a Front Desk
# sweep when issues or PRs change in that repo. The calling workflow needs
# access to FRONT_DESK_APP_CLIENT_ID and FRONT_DESK_APP_PRIVATE_KEY (org secrets,
# scoped to public repos) — pass them via `secrets: inherit`.
#
# Example usage in another repo:
#
#   on:
#     issues:
#       types: [opened, closed, reopened, labeled, unlabeled]
#     pull_request:
#       types: [opened, closed, reopened, labeled, unlabeled]
#   jobs:
#     sync:
#       uses: bounded-systems/gh-project-room/.github/workflows/trigger-sync.yml@main
#       secrets: inherit
on:
  workflow_call: {}
permissions: {}
jobs:
  sync:
    uses: bounded-systems/gh-project-room/.github/workflows/front-desk-sync.yml@main
    secrets: inherit
